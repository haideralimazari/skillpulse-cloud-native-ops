name: CI

permissions:
  security-events: write
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets in code
        uses: zricethezav/gitleaks-action@v1
        with:
          args: detect --source . --verbose --report-format sarif --report-path gitleaks.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GitLeaks SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

  trivy-code-scan:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'backend-trivy.sarif'

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'frontend-trivy.sarif'

      - name: Upload backend SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: backend-trivy.sarif

      - name: Upload frontend SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: frontend-trivy.sarif

      - name: Upload Trivy SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            backend-trivy.sarif
            frontend-trivy.sarif

  build-push-backend:
    name: "Build & Push Backend Image"
    needs: trivy-code-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: |
          docker build -t backend:temp ./backend

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          input: 'backend:temp'
          format: 'table'

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push backend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend' }}
          docker tag backend:temp ${IMAGE}:latest
          docker tag backend:temp ${IMAGE}:${GITHUB_SHA}
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${GITHUB_SHA}

  build-push-frontend:
    name: "Build & Push Frontend Image"
    needs: trivy-code-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build frontend image
        run: |
          docker build -t frontend:temp ./frontend

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          input: 'frontend:temp'
          format: 'table'

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push frontend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend' }}
          docker tag frontend:temp ${IMAGE}:latest
          docker tag frontend:temp ${IMAGE}:${GITHUB_SHA}
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${GITHUB_SHA}
